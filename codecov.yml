codecov:
  require_ci_to_pass: yes
  allow_coverage_offsets: no
  
coverage:
  precision: 2
  round: down
  range:
    - 70
    - 100

comment:
  layout: reach,diff,flags,tree
  behavior: default
  require_changes: no
  require_base: no

status:
  project:
    default:
      target: 80%
      threshold: 5%
      base: auto
  
  patch:
    default:
      target: 50%
      threshold: null

# Codecov flags for multi-service builds
flags:
  backend:
    paths:
      - backend/
    carryforward: yes
  frontend:
    paths:
      - frontend/
    carryforward: yes
